<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#050d1a"/>

  <!-- corner brackets -->
  <path d="M4 9 L4 4 L9 4" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <path d="M23 4 L28 4 L28 9" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <path d="M4 23 L4 28 L9 28" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-linecap="square"/>
  <path d="M23 28 L28 28 L28 23" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-linecap="square"/>

  <!-- face oval -->
  <ellipse cx="16" cy="16" rx="7" ry="8.5" stroke="#00e5ff" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- eyes -->
  <circle cx="13.2" cy="14" r="1.1" fill="#00e5ff"/>
  <circle cx="18.8" cy="14" r="1.1" fill="#00e5ff"/>

  <!-- nose bridge -->
  <line x1="16" y1="15.5" x2="16" y2="18" stroke="#00e5ff" stroke-width="0.8" opacity="0.6"/>

  <!-- mouth -->
  <path d="M13.5 20 Q16 21.5 18.5 20" stroke="#00e5ff" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- scan line -->
  <line x1="7" y1="16" x2="25" y2="16" stroke="#00e5ff" stroke-width="0.6" opacity="0.35"/>

  <!-- center dot -->
  <circle cx="16" cy="16" r="0.8" fill="#00e5ff" opacity="0.5"/>
</svg>
